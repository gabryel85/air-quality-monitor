<!doctype html>
<html lang="pl" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF6200" />
    <title>Air Quality Monitor</title>
    <script>
      /* Theme bootstrap: runs before React mounts, prevents FOUC.
         Reads localStorage['theme'] ∈ {'light','dark','auto'} (default 'auto')
         and resolves to .dark class on <html>. */
      (function () {
        try {
          var stored = localStorage.getItem('theme') || 'auto';
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var effective = stored === 'auto' ? (systemDark ? 'dark' : 'light') : stored;
          var html = document.documentElement;
          html.dataset.theme = stored;
          html.classList.toggle('dark', effective === 'dark');
        } catch (e) {
          /* localStorage blocked — fall back to system preference */
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
