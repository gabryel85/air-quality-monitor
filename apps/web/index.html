<!doctype html>
<html lang="pl" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF6200" />
    <title>Air Quality Monitor</title>
    <script>
      /* Theme bootstrap: runs before React mounts, prevents FOUC.
         Reads localStorage['theme'] ∈ {'light','dark','auto'} (default 'auto')
         and resolves to .dark class on <html>. */
      (function () {
        try {
          var stored = localStorage.getItem('theme') || 'auto';
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var effective = stored === 'auto' ? (systemDark ? 'dark' : 'light') : stored;
          var html = document.documentElement;
          html.dataset.theme = stored;
          html.classList.toggle('dark', effective === 'dark');
        } catch (e) {
          /* localStorage blocked — fall back to system preference */
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
    <style>
      /* Boot splash — shown until React mounts. Inline so it paints before
         any bundle (tokens.css, fonts) loads. createRoot() replaces #root's
         children, so the splash disappears the moment the app is ready. */
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: #fffdf8;
        color: #1a1a2e;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      .dark #boot-splash {
        background: #0b1437;
        color: #e8eaf2;
      }
      #boot-splash .boot-mark {
        font-size: 1.125rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      #boot-splash .boot-mark span {
        color: #ff6200;
      }
      #boot-splash .boot-spinner {
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        border: 3px solid rgba(255, 98, 0, 0.2);
        border-top-color: #ff6200;
        animation: boot-spin 0.8s linear infinite;
      }
      #boot-splash .boot-msg {
        font-size: 0.875rem;
        opacity: 0.7;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-spinner {
          animation-duration: 2s;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <div class="boot-mark">Air Quality <span>Monitor</span></div>
        <div class="boot-spinner" role="status" aria-label="Loading"></div>
        <div class="boot-msg">Initializing mock data…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
