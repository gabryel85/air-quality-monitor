name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm 11 blocks dependency build scripts by default and exits non-zero
      # on ignored builds. Skip all lifecycle scripts, then explicitly rebuild
      # the two that genuinely need it (esbuild's binary, msw's worker).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts && pnpm rebuild esbuild msw

      - name: Lint
        run: pnpm -F @aqm/web lint

      - name: Typecheck
        run: pnpm -F @aqm/web typecheck

      - name: Test
        run: pnpm -F @aqm/web test:run

      - name: Build
        run: pnpm -F @aqm/web build

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: apps/web/dist
          retention-days: 7
          if-no-files-found: error
